<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Proyecto Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
  <ul>
    <li><a href="#">Inicio</a></li>
    <li><a href="#">Artículos</a></li>
    <li><a href="#">Contacto</a></li>
  </ul>
</nav>
  <header>
    <h1>Bienvenido a Mi Web</h1>
    <p>Contenido útil y entretenido para vos</p>
  </header>

  <main>
    <section class="card">
      <h2>Artículo 1</h2>
      <p>Este es un ejemplo de contenido que podrías expandir.</p>
    </section>

    <section class="card">
      <h2>Artículo 2</h2>
      <p>Otro bloque de contenido atractivo.</p>
    </section>
  </main>

<section class="contacto">
  <h2>Contacto</h2>
  <form>
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" required>

    <label for="email">Correo:</label>
    <input type="email" id="email" name="email" required>

    <label for="mensaje">Mensaje:</label>
    <textarea id="mensaje" name="mensaje" rows="4" required></textarea>

    <button type="submit">Enviar</button>
  </form>
</section>
  
<section class="trivia">
  <h2>Trivia del día</h2>
  <p id="pregunta"></p>
  <ul id="opciones"></ul>
  <p id="resultado"></p>
</section>

  <footer>
    <p>© 2026 Mi Proyecto Web</p>
  </footer>
  <script src="script.js"></script>
  <script src="trivias.js"></script>
<script src="script.js"></script>
</body>
</html>
